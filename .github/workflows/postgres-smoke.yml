name: Postgres Smoke

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: multi_agent_search
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d multi_agent_search"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DEEPSEEK_API_KEY: test-key
      TASK_STORE_BACKEND: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: multi_agent_search

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run postgres runtime smoke
        run: python scripts/smoke_postgres_runtime.py
