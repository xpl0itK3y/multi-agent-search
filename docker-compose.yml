x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  depends_on:
    migrate:
      condition: service_completed_successfully
    db:
      condition: service_healthy
  env_file:
    - .env
  environment:
    POSTGRES_HOST: db
    POSTGRES_PORT: 5432
  command: ["python", "scripts/run_finalize_worker.py"]
  restart: unless-stopped

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-search-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-search-ui
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000
      STREAMLIT_WORKER_NAME: job-worker
    command:
      [
        "streamlit",
        "run",
        "src/ui/streamlit_app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    ports:
      - "8501:8501"
    restart: unless-stopped

  worker:
    <<: *worker-base
    container_name: multi-agent-search-worker
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WORKER_NAME: job-worker

  worker_2:
    <<: *worker-base
    container_name: multi-agent-search-worker-2
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WORKER_NAME: job-worker-2

  worker_3:
    <<: *worker-base
    container_name: multi-agent-search-worker-3
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      WORKER_NAME: job-worker-3

  db:
    image: postgres:16-alpine
    container_name: multi-agent-search-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-multi_agent_search}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-multi_agent_search}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-search-migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

volumes:
  postgres_data:
